name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    
    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Run Typecheck
      run: npx tsc --noEmit

    - name: Run Tests
      run: npm run test

    - name: Run Build
      run: npm run build

  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    steps:
    - uses: actions/checkout@v4
    - uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: wasm32-unknown-unknown
        override: true
        
    - name: Run Cargo Test
      run: cargo test
      
    - name: Build Contract
      run: cargo build --target wasm32-unknown-unknown --release
